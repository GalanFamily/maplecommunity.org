  html, body { overflow-x: hidden; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);

  .font-serif { font-family: 'Fraunces', Georgia, serif; font-variation-settings: "opsz" 144; }
  ::selection { background: #F4C99F; color: var(--maple-deep); }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .lift { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, border-color .35s ease; }
  .lift:hover { transform: translateY(-4px); box-shadow: 0 18px 36px -22px rgba(43,24,16,.22); }

  /* Falling maple samaras — descend (outer) + autorotate like a helicopter (inner) */
  @keyframes mapleFall {
    0%   { transform: translate(0, -10vh); opacity: 0; }
    10%  { opacity: .6; }
    90%  { opacity: .6; }
    100% { transform: translate(var(--dx, 0), 110vh); opacity: 0; }
  }
  /* Spin about the vertical axis (rotateY) with a fixed tilt — samara autorotation, not a cartwheel */
  @keyframes mapleHeli {
    from { transform: perspective(600px) rotateZ(var(--tilt, 22deg)) rotateY(0deg); }
    to   { transform: perspective(600px) rotateZ(var(--tilt, 22deg)) rotateY(360deg); }
  }
  .maple-fall { animation: mapleFall var(--dur, 24s) linear infinite; animation-delay: var(--delay, 0s); }
  .maple-spin { display: inline-block; animation: mapleHeli var(--spin, 1.1s) linear infinite; }
  /* Warm-handoff: community nodes gently fade — the fragility of connection */
  @keyframes commPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .comm-node { animation: commPulse 6.5s ease-in-out infinite; }
  /* Warm-handoff interactive: gentle bob for the held dot */
  @keyframes bobY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .bob { animation: bobY 4s ease-in-out infinite; }

  @keyframes sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
  .sway { transform-origin: bottom center; animation: sway 7s ease-in-out infinite; }

  .grain { position: relative; }
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(43,24,16,0.045) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: multiply;
  }

  .underline-grow {
    background-image: linear-gradient(currentColor, currentColor);
    background-size: 0 1px; background-position: 0 100%; background-repeat: no-repeat;
    transition: background-size .4s ease;
  }
  .underline-grow:hover { background-size: 100% 1px; }

  @keyframes softPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(168,52,26,0.55); }
    50% { box-shadow: 0 0 0 7px rgba(168,52,26,0); }
  }
  .pulse-dot { animation: softPulse 2.4s ease-in-out infinite; }

  /* Braid */
  @keyframes braidShift { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -200; } }
  .braid-strand { animation: braidShift 18s linear infinite; }

  /* Marquee for community words */
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 60s linear infinite; }

<script type="text/babel">
const { useEffect, useState, useRef } = React;

/* ---------- Reveal-on-scroll ---------- */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ---------- Maple samara icon (uses brand mask asset) ---------- */
const MapleLeaf = ({ size = 32, color = "var(--maple)", className = "" }) => (
  <span
    role="img"
    aria-hidden="true"
    className={className}
    style={{
      display: "inline-block",
      width: size,
      height: size,
      backgroundColor: color,
      WebkitMaskImage: "url('assets/maple-icon.png')",
      maskImage: "url('assets/maple-icon.png')",
      WebkitMaskRepeat: "no-repeat",
      maskRepeat: "no-repeat",
      WebkitMaskPosition: "center",
      maskPosition: "center",
      WebkitMaskSize: "contain",
      maskSize: "contain",
    }}
  />
);

/* ---------- Logo lockup ---------- */
const Logo = ({ size = 34, dark = false }) => (
  <div className="inline-flex items-center gap-2.5">
    <span className="sway inline-block"><MapleLeaf size={size} color="var(--maple)"/></span>
    <span className="font-bold lowercase" style={{ fontFamily: "var(--logo-font, 'Inter', system-ui, sans-serif)", fontWeight: "var(--logo-weight, 700)", fontSize: size*0.7, color: dark ? "#fff" : "var(--ink)", lineHeight: 1, letterSpacing: "var(--logo-tracking, -0.01em)" }}>maple</span>
  </div>
);

/* ---------- Falling leaves (only in hero) ---------- */
const FallingLeaves = () => {
  const leaves = Array.from({length: 8}).map((_, i) => ({
    left: (i * 47 + 7) % 95,
    delay: -(i * 3 + (i % 3) * 2),
    dur: 14 + (i % 4) * 3,
    dx: ((i * 41) % 60) - 30 + "vw",
    size: 18 + (i % 3) * 8,
    color: ["var(--maple)", "var(--amber)", "var(--maple-deep)", "var(--amber-soft)"][i % 4],
    spin: (0.85 + (i % 4) * 0.18).toFixed(2),
    tilt: 16 + (i % 3) * 7,
  }));
  return (
    <div className="absolute inset-0 pointer-events-none z-[1] overflow-hidden" aria-hidden="true">
      {leaves.map((l, i) => (
        <span key={i} className="absolute maple-fall" style={{ left: l.left+"%", top: 0, "--dur": l.dur+"s", "--delay": l.delay+"s", "--dx": l.dx, animationDelay: l.delay+"s" }}>
          <span className="maple-spin" style={{ "--spin": l.spin+"s", "--tilt": l.tilt+"deg", animationDelay: l.delay+"s" }}>
            <MapleLeaf size={l.size} color={l.color}/>
          </span>
        </span>
      ))}
    </div>
  );
};

/* ---------- Nav ---------- */

    const onScroll = () => setScrolled(window.scrollY > 30);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <nav className={`fixed w-full z-50 transition-all ${scrolled ? "bg-white/85 backdrop-blur-md border-b border-stone-200/70 py-3" : "bg-transparent py-5"}`}>
      <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">

        <div className="hidden md:flex items-center gap-7 text-sm font-medium" style={{ color: "var(--ink)" }}>

          <a href="#case" className="hover:opacity-70">The problem</a>
          <a href="#community" className="hover:opacity-70">Community</a>
          <a href="#work" className="hover:opacity-70">Projects</a>
          <a href="#study" className="hover:opacity-70">Research</a>
          <a href="#who" className="hover:opacity-70">Who we are</a>
        </div>
        <a href="#contact" className="text-white text-sm font-semibold px-4 py-2 rounded-full" style={{ background: "var(--maple-deep)" }}>Get in touch</a>
      </div>

}

/* ---------- Thesis: Community is the answer (bridge to health comes later) ---------- */

  return (
    <section id="thesis" className="py-20 px-6 relative">

        <div className="grid lg:grid-cols-2 gap-10 lg:gap-14 items-start">
          <div className="reveal">
            <span className="text-[10px] font-bold uppercase tracking-[0.28em]" style={{ color: "var(--maple)" }}>We are facing a public health crisis</span>
            <h2 className="font-serif font-bold lowercase mt-5 leading-[0.95] tracking-tight" style={{ color: "var(--ink)", fontSize: "clamp(40px, 6vw, 76px)" }}>
              the loss of community is a <span className="italic" style={{ color: "var(--maple)" }}>health crisis.</span>

          </div>

          <div className="reveal rounded-2xl border border-stone-200 bg-white p-6 md:p-7">
            <div className="text-[10px] font-bold uppercase tracking-[0.22em] mb-3" style={{ color: "var(--maple-deep)" }}>U.S. Surgeon General · 2023</div>
            <p className="text-[15px] leading-relaxed text-stone-700">In 2023, the U.S. Surgeon General issued a formal advisory declaring loneliness and isolation a national epidemic. Its physical toll rivals our most serious health risks:</p>
            <ul className="mt-4 space-y-2.5 text-[14px] text-stone-700">
              <li className="flex gap-3"><span style={{ color: "var(--maple)" }}>•</span><span>As deadly as smoking up to <strong style={{ color: "var(--ink)" }}>15 cigarettes a day</strong>.</span></li>
              <li className="flex gap-3"><span style={{ color: "var(--maple)" }}>•</span><span>A greater risk to health than <strong style={{ color: "var(--ink)" }}>obesity or physical inactivity</strong>.</span></li>
              <li className="flex gap-3"><span style={{ color: "var(--maple)" }}>•</span><span>Raises the risk of <strong style={{ color: "var(--ink)" }}>heart disease (+29%), stroke (+32%), and dementia (+50%)</strong>.</span></li>
              <li className="flex gap-3"><span style={{ color: "var(--maple)" }}>•</span><span>An epidemic on the scale of <strong style={{ color: "var(--ink)" }}>tobacco and opioids</strong>.</span></li>
            </ul>
            <a href="https://www.hhs.gov/sites/default/files/surgeon-general-social-connection-advisory.pdf" target="_blank" rel="noopener" className="mt-5 inline-flex items-center gap-2 text-[13px] font-semibold underline-grow" style={{ color: "var(--maple-deep)" }}>

            </a>

/* ---------- What is community? (the grid) ---------- */
function WhatIsCommunity() {

    <section id="community" className="py-20 px-6 relative" style={{ background: "var(--paper-2)" }}>
      <div className="max-w-7xl mx-auto">
        <div className="reveal mb-12 max-w-3xl">

          <h2 className="font-serif font-bold lowercase mt-5 leading-[0.95] tracking-tight" style={{ color: "var(--ink)", fontSize: "clamp(40px, 6vw, 76px)" }}>

          </h2>
          <p className="mt-7 text-lg text-stone-700 leading-relaxed font-medium">

          </p>
          <p className="mt-5 text-lg text-stone-700 leading-relaxed font-medium">

          </p>
        </div>

      </div>
    </section>
  );
}

/* ---------- Who we are: origin story ---------- */
function WhoWeAre() {

  const milestones = [
    {
      k: "The start",
      t: "A flamingo on the lawn.",
      b: "It started with Flamingo Friday in our own neighborhood in San Carlos, CA — a small, silly, joyful weekly ritual that gave people a reason to step outside and find each other.",

    },
    {
      k: "It spread",
      t: "The neighbors noticed.",
      b: "Our town magazine picked it up, and people started asking how to run a Flamingo Friday on their own block. A ritual we made up became something other neighborhoods wanted.",

    },

/* ---------- The case for community: research ---------- */
function TheCase() {
  // Every statistic is sourced and fact-checked (June 2026). Keep citations with any edits.
  const stats = [
    { big: "74%", pct: 74, sub: "of Americans don't feel a strong sense of community.", src: "American Home Shield · Digital Third Coast" },
    { big: "13%", pct: 13, sub: "of Americans know their neighbors' names.", src: "American Home Shield · Digital Third Coast" },
    { big: "54%", pct: 54, sub: "of adults report feeling isolated.", src: "American Psychological Association" },
  ];

  const illness = [
    { big: "15", viz: "cigs", sub: "Social disconnection is as deadly as smoking up to 15 cigarettes a day.", src: "U.S. Surgeon General's Advisory, 2023" },
    { big: "+50%", viz: "up", sub: "higher risk of dementia in older adults — alongside higher risk of heart disease and stroke.", src: "U.S. Surgeon General's Advisory, 2023" },
    { big: "42%", pct: 42, sub: "of U.S. high schoolers feel persistently sad or hopeless — up about 50% in a decade.", src: "CDC, Youth Risk Behavior Survey" },
  ];

  const health = [
    { big: "≈70%", pct: 70, sub: "higher risk of hospitalization for socially isolated patients.", src: "Manemann et al., 2018" },
    { big: "6×", viz: "mult", n: 6, sub: "more likely to be reincarcerated with no visitors, versus those with three or more.", src: "California parolee study · Prison Policy Initiative" },
    { big: "$6.7B", viz: "cost", sub: "in extra Medicare spending every year, linked to social isolation among older adults.", src: "AARP Public Policy Institute" },
  ];

  const [showData, setShowData] = useState(false);

  // One stat, told visually.
  const Stat = (s, i) => (
    <div key={i} className="rounded-3xl p-7 grain flex flex-col justify-between min-h-[250px]" style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.12)" }}>
      <div>
        <div className="font-serif font-bold leading-none" style={{ fontSize: "clamp(42px, 5vw, 66px)", color: "var(--amber-soft)" }}>{s.big}</div>
        {typeof s.pct === "number" && (
          <div className="mt-5 h-2.5 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,0.12)" }} aria-hidden="true">
            <div className="h-full rounded-full" style={{ width: s.pct + "%", background: "var(--amber-soft)" }}></div>
          </div>
        )}
        {s.viz === "cigs" && (
          <div className="flex gap-[4px] mt-5" aria-hidden="true">
            {Array.from({length: 15}).map((_, k) => (<span key={k} style={{ width: "5px", height: "26px", borderRadius: "1px", background: k < 14 ? "#F4C99F" : "var(--maple)", opacity: 0.85 }}></span>))}
          </div>
        )}
        {s.viz === "mult" && (
          <div className="flex gap-1.5 mt-5" aria-hidden="true">
            {Array.from({length: s.n}).map((_, k) => (<span key={k} style={{ width: "12px", height: "26px", borderRadius: "3px", background: "var(--amber-soft)", opacity: 0.32 + k * 0.12 }}></span>))}
          </div>
        )}
        {s.viz === "up" && (
          <div className="mt-5" aria-hidden="true"><svg width="50" height="28" viewBox="0 0 50 28" fill="none" stroke="var(--amber-soft)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 26 L18 14 L30 19 L48 3"/><path d="M37 3 L48 3 L48 14"/></svg></div>
        )}
      </div>
      <div className="mt-5">
        <p className="text-[14px] leading-snug text-stone-200">{s.sub}</p>
        <div className="text-[10px] uppercase tracking-[0.16em] font-bold text-stone-500 mt-3">{s.src}</div>
      </div>
    </div>
  );

  const chapters = [
    { lead: "First — ", hi: "we pulled apart.", data: stats },
    { lead: "Then — ", hi: "it started making us sick.", data: illness },
    { lead: "And it landed in our most expensive, least humane places — ", hi: "hospitals and jails.", data: health },
  ];

  return (
    <section id="case" className="py-20 px-6 relative overflow-hidden" style={{ background: "var(--ink)", color: "#fff" }}>
      <div className="absolute -top-24 -right-24 opacity-[0.05] pointer-events-none">
        <MapleLeaf size={420} color="#F4C99F"/>
      </div>

      <div className="max-w-7xl mx-auto relative">
        <div className="reveal max-w-3xl mb-14">
          <span className="text-[10px] font-bold uppercase tracking-[0.28em]" style={{ color: "var(--amber-soft)" }}>Why now</span>
          <h2 className="font-serif font-bold lowercase mt-5 leading-[0.95] tracking-tight" style={{ fontSize: "clamp(40px, 6vw, 76px)" }}>
            the fabric is <span className="italic" style={{ color: "var(--amber-soft)" }}>fraying.</span>
          </h2>
          <p className="mt-7 text-lg leading-relaxed font-medium text-stone-300">
            We are more disconnected than ever. It shows up across every layer of community: the people next door, the dinner table, the classroom, the clubs and congregations we used to join. It's making us sicker and overloading our most expensive and least humane settings — hospitals and jails.
          </p>
        </div>

        <div className="reveal flex justify-center">
          <button type="button" onClick={() => setShowData(v => !v)} className="inline-flex items-center gap-2 px-6 py-3 rounded-full font-semibold text-sm border transition" style={{ borderColor: "rgba(244,201,159,0.45)", color: "var(--amber-soft)", background: showData ? "rgba(244,201,159,0.08)" : "transparent" }}>
            {showData ? "Hide the data" : "See the data"}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{ transform: showData ? "rotate(180deg)" : "none", transition: "transform .3s" }}><path d="M6 9l6 6 6-6"/></svg>
          </button>
        </div>

        {showData && (
        <div className="mt-16 space-y-16">
          {chapters.map((ch, ci) => (
            <div key={ci}>
              <p className="font-serif leading-snug max-w-3xl mb-8" style={{ fontSize: "clamp(26px, 3.6vw, 44px)" }}>
                {ch.lead}<span className="italic" style={{ color: "var(--amber-soft)" }}>{ch.hi}</span>
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                {ch.data.map((s, i) => Stat(s, i))}
              </div>
            </div>
          ))}
        </div>
        )}

      </div>
    </section>
  );
}

/* ---------- Warm-handoff interactive (JS-driven): one person hops the community row;
   when a node's connection fades, they fall through into the hospital or jail below. ---------- */
function HandoffViz() {
  const NODES = [
    { x: 110, label: "Family",    icon: "heart",  tone: "#A8341A" },
    { x: 268, label: "Neighbors", icon: "house",  tone: "#D97706" },
    { x: 426, label: "Faith",     icon: "faith",  tone: "#C2410C" },
    { x: 584, label: "Clinic",    icon: "plus",   tone: "#4A6741" },
    { x: 742, label: "School",    icon: "book",   tone: "#D14B6A" },
    { x: 900, label: "Friends",   icon: "people", tone: "#A8341A" },
  ];
  const CRACKS = [{ label: "Hospital", x: 505 }, { label: "Jail", x: 663 }];
  const ROW_Y = 120, FALL_Y = 306, THRESH = 0.34;
  const D = { pause: 0.55, hop: 1.2, fall: 1.15, bottom: 1.1, reset: 0.7 };

  const [, force] = useState(0);
  const sim = useRef({ mode: "pause", i: 0, next: 1, prog: 0, gapX: 0 });
  const clk = useRef(0);
  const fadeRef = useRef(NODES.map(() => 1));

  useEffect(() => {
    let raf, last = null;
    const fadeAt = (i, t) => 0.62 + 0.4 * Math.cos(0.8 * t + i * 2.3);
    const step = (now) => {
      if (last == null) last = now;
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      clk.current += dt;
      const t = clk.current;
      fadeRef.current = NODES.map((_, i) => Math.max(0.16, Math.min(1, fadeAt(i, t))));
      const s = sim.current;
      s.prog += dt;
      if (s.mode === "pause" && s.prog >= D.pause) {
        const next = s.i + 1;
        if (next >= NODES.length) { s.mode = "reset"; s.prog = 0; }
        else if (fadeRef.current[next] < THRESH) { s.mode = "fall"; s.prog = 0; s.next = next; s.gapX = (NODES[s.i].x + NODES[next].x) / 2; }
        else { s.mode = "hop"; s.prog = 0; s.next = next; }
      } else if (s.mode === "hop" && s.prog >= D.hop) { s.i = s.next; s.mode = "pause"; s.prog = 0; }
      else if (s.mode === "fall" && s.prog >= D.fall) { s.mode = "bottom"; s.prog = 0; }
      else if (s.mode === "bottom" && s.prog >= D.bottom) { s.mode = "reset"; s.prog = 0; }
      else if (s.mode === "reset" && s.prog >= D.reset) { s.i = 0; s.next = 1; s.mode = "pause"; s.prog = 0; }
      force((v) => (v + 1) & 1023);
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, []);

  const fades = fadeRef.current;
  const s = sim.current;
  const easeIn = (u) => u * u;
  let dx = NODES[0].x, dy = ROW_Y, dop = 1;
  if (s.mode === "hop") {
    const u = Math.min(1, s.prog / D.hop);
    dx = NODES[s.i].x + (NODES[s.next].x - NODES[s.i].x) * u;
    dy = ROW_Y - 58 * 4 * u * (1 - u);
  } else if (s.mode === "fall") {
    const u = Math.min(1, s.prog / D.fall);
    dx = NODES[s.i].x + (s.gapX - NODES[s.i].x) * Math.min(1, u * 2);
    const apex = ROW_Y - 34;
    dy = u < 0.28 ? ROW_Y - (ROW_Y - apex) * (u / 0.28) : apex + (FALL_Y - apex) * easeIn((u - 0.28) / 0.72);
  } else if (s.mode === "bottom") {
    dx = s.gapX; dy = FALL_Y;
  } else if (s.mode === "reset") {
    dx = NODES[0].x; dy = ROW_Y; dop = Math.min(1, s.prog / D.reset);
  } else {
    dx = NODES[s.i].x; dy = ROW_Y;
  }

  return (
    <div className="-mx-2 md:mx-0 overflow-x-auto md:overflow-visible">
      <svg viewBox="0 0 1000 360" className="block mx-auto h-auto" style={{ minWidth: 720, width: "100%" }} role="img" aria-label="A person hops along a row of community supports; when a connection fades, they fall through into the hospital or jail below.">
        <line x1="40" y1="218" x2="960" y2="218" stroke="#2B1810" strokeOpacity="0.22" strokeWidth="2" strokeDasharray="7 7"/>
        <rect x="40" y="220" width="920" height="132" rx="14" fill="#2B1810" opacity="0.045"/>
        <text x="52" y="210" fontFamily="Inter" fontSize="11" fontWeight="800" letterSpacing="2" fill="#2B1810" opacity="0.4">HELD IN COMMUNITY</text>
        <text x="52" y="245" fontFamily="Inter" fontSize="11" fontWeight="800" letterSpacing="2" fill="#6B1F0E" opacity="0.55">THROUGH THE CRACKS</text>

        {NODES.slice(0, -1).map((p, i) => (
          <line key={i} x1={p.x + 30} y1={ROW_Y} x2={NODES[i + 1].x - 30} y2={ROW_Y} stroke="#A8341A" strokeWidth="2.5" strokeDasharray="2 8" strokeLinecap="round" opacity={0.65 * Math.min(fades[i], fades[i + 1])}/>
        ))}

        {NODES.map((p, i) => (
          <g key={p.label} transform={`translate(${p.x} ${ROW_Y})`} opacity={fades[i]}>
            <circle r="30" fill="#fff" stroke={p.tone} strokeWidth="2.25"/>
            <g stroke={p.tone} strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round">
              {p.icon === "heart" && <path d="M0 7 C-7 1 -11 -4 -6 -9 C-3 -12 0 -9 0 -6 C0 -9 3 -12 6 -9 C11 -4 7 1 0 7 Z"/>}
              {p.icon === "house" && <g><path d="M-9 9 V-1 L0 -9 L9 -1 V9 Z"/><path d="M-3 9 V2 H3 V9"/></g>}
              {p.icon === "faith" && <g><path d="M-9 9 V-2 L0 -9 L9 -2 V9 Z"/><path d="M0 -9 V-14 M-2.5 -11.5 H2.5"/></g>}
              {p.icon === "plus" && <path d="M0 -9 V9 M-9 0 H9"/>}
              {p.icon === "book" && <g><path d="M0 -7 V8"/><path d="M0 -7 Q-5 -9 -9 -7 V7 Q-5 6 0 8"/><path d="M0 -7 Q5 -9 9 -7 V7 Q5 6 0 8"/></g>}
              {p.icon === "people" && <g><circle cx="-4.5" cy="-3" r="3"/><circle cx="4.5" cy="-3" r="3"/><path d="M-10 9 Q-10 2 -4.5 2 M10 9 Q10 2 4.5 2"/></g>}
            </g>
            <text textAnchor="middle" y="52" fontFamily="Fraunces, serif" fontWeight="600" fontSize="16" fill="#2B1810">{p.label}</text>
          </g>
        ))}

        {CRACKS.map((p) => (
          <g key={p.label} transform={`translate(${p.x} 300)`}>
            <circle r="22" fill="#2B1810"/>
            <circle r="5" fill="#F4C99F" fillOpacity="0.7"/>
            <text textAnchor="middle" y="42" fontFamily="Fraunces, serif" fontWeight="600" fontSize="14" fill="#6B1F0E">{p.label}</text>
          </g>
        ))}

        <g opacity={dop}>
          <circle cx={dx} cy={dy} r="15" fill="#A8341A" fillOpacity="0.22"/>
          <circle cx={dx} cy={dy} r="9" fill="#6B1F0E" stroke="#fff" strokeWidth="2"/>
        </g>
      </svg>
    </div>
  );
}

              { src: "Holt-Lunstad et al. · PLoS Medicine, 2010", title: "Social Relationships and Mortality Risk: A Meta-Analytic Review", take: "Across 148 studies and 300,000+ people, strong ties raised the odds of survival by about 50%.", href: "https://doi.org/10.1371/journal.pmed.1000316" },
              { src: "Berkman & Syme · Am. J. Epidemiology, 1979", title: "Social Networks, Host Resistance, and Mortality (Alameda County)", take: "People with fewer social ties were 2–3× more likely to die over nine years." },
              { src: "House, Landis & Umberson · Science, 1988", title: "Social Relationships and Health", take: "Social isolation rivals smoking as a risk factor for early death." },
              { src: "Egolf et al. · Am. J. Public Health, 1992", title: "The Roseto Effect: A 50-Year Comparison of Mortality Rates", take: "A tight-knit town had far less heart disease — until its close community frayed." },
              { src: "Ruberman et al. · NEJM, 1984", title: "Psychosocial Influences on Mortality After Myocardial Infarction", take: "Socially isolated heart-attack survivors faced 2–3× the risk of death." },
              { src: "Williams et al. · JAMA, 1992", title: "Social Resources and Survival in Coronary Artery Disease", take: "Patients without a spouse or confidant were far more likely to die within five years." },
              { src: "Spiegel et al. · The Lancet, 1989", title: "Psychosocial Treatment and Survival in Metastatic Breast Cancer", take: "A landmark (and later debated) trial linking weekly support groups to longer survival." },
              { src: "Duwe & Clark · Crim. Justice Policy Review, 2013", title: "Blessed Be the Social Tie That Binds: Prison Visitation & Recidivism", take: "Visits during incarceration measurably reduced reoffending after release." },
              { src: "Flowers et al. · AARP Public Policy Institute, 2017", title: "Medicare Spends More on Socially Isolated Older Adults", take: "Isolation is tied to about $6.7 billion in extra Medicare spending each year." },
              { src: "Klinenberg · 2002", title: "Heat Wave: A Social Autopsy of Disaster in Chicago", take: "In a deadly heat wave, better-connected neighborhoods lost far fewer lives." },
              { src: "Cacioppo & Patrick · 2008", title: "Loneliness: Human Nature and the Need for Social Connection", take: "Loneliness reshapes the body — stress hormones, immunity, sleep, and the heart." },
              { src: "Christakis & Fowler · NEJM, 2007", title: "The Spread of Obesity in a Large Social Network", take: "Health ripples through social networks — we quietly shape each other." },
              { src: "Dean Ornish · 1998", title: "Love & Survival: The Healing Power of Intimacy", take: "A physician's synthesis of the evidence that connection itself is medicine." },
            ].map((s, i) => (
              <a key={i} href={s.href || ("https://scholar.google.com/scholar?q=" + encodeURIComponent(s.title))} target="_blank" rel="noopener" className="snap-start shrink-0 rounded-3xl p-7 flex flex-col" style={{ width: 320, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.12)" }}>
                <div className="text-[11px] font-bold uppercase tracking-[0.14em]" style={{ color: "var(--amber-soft)" }}>{s.src}</div>
                <div className="font-serif leading-snug mt-4 mb-4 flex-1" style={{ fontSize: "20px", color: "#fff" }}>{s.title}</div>
                <p className="text-[13.5px] leading-relaxed text-stone-300 mb-5">{s.take}</p>
                <span className="inline-flex items-center gap-2 text-[13px] font-semibold" style={{ color: "var(--amber-soft)" }}>Read the study <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M7 17 17 7M7 7h10v10"/></svg></span>
              </a>
            ))}
            <div className="shrink-0" style={{ width: 1 }}></div>
          </div>
        </div>

        {/* Webinars — slider */}
        <div className="reveal mt-14">
          <div className="flex items-end justify-between gap-4 mb-6 flex-wrap">
            <div className="max-w-2xl">
              <span className="text-[10px] font-bold uppercase tracking-[0.28em]" style={{ color: "var(--amber-soft)" }}>Free webinars</span>
              <p className="text-stone-300 text-[15px] leading-relaxed mt-3">

            <div className="flex gap-2">
              <button type="button" onClick={() => slideWeb(-1)} className="w-11 h-11 rounded-full flex items-center justify-center text-white transition hover:bg-white/10" style={{ border: "1px solid rgba(255,255,255,0.25)" }} aria-label="Previous webinars">

            </div>
          </div>

          <div ref={webRef} className="flex gap-4 overflow-x-auto snap-x snap-mandatory pb-4" style={{ scrollbarWidth: "none" }}>
            {[
              { title: "Community & Medicine", day: "Mon, Jun 8", time: "11:00 AM" },

                <div className="font-serif italic leading-snug mt-5 mb-7 flex-1" style={{ fontSize: "clamp(20px, 2.4vw, 26px)", color: "#fff" }}>{w.title}</div>
                <a href="https://app.livestorm.co/p/d4b8e791-3f1d-4d23-852c-4dac7e55f3fa" target="_blank" rel="noopener" className="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-full font-semibold text-sm text-white self-start" style={{ background: "var(--maple)" }}>

              </div>
            ))}
            <div className="shrink-0" style={{ width: 1 }}></div>
          </div>
        </div>

        {/* OPEN DECISION (pending Megan's IRB / research-design work): do NOT add outcome numbers or claim measured study results until confirmed. */}
      </div>
    </section>
  );
}
