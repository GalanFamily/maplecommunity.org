<script type="text/babel">
const { useEffect, useState, useRef } = React;

/* ---------- Reveal-on-scroll ---------- */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ---------- Maple samara icon (uses brand mask asset) ---------- */
const MapleLeaf = ({ size = 32, color = "var(--maple)", className = "" }) => (
  <span
    role="img"
    aria-hidden="true"
    className={className}
    style={{
      display: "inline-block",
      width: size,
      height: size,
      backgroundColor: color,
      WebkitMaskImage: "url('assets/maple-icon.png')",
      maskImage: "url('assets/maple-icon.png')",
      WebkitMaskRepeat: "no-repeat",
      maskRepeat: "no-repeat",
      WebkitMaskPosition: "center",
      maskPosition: "center",
      WebkitMaskSize: "contain",
      maskSize: "contain",
    }}
  />
);

/* ---------- Falling leaves (only in hero) ---------- */
const FallingLeaves = () => {
  const leaves = Array.from({length: 8}).map((_, i) => ({
    left: (i * 47 + 7) % 95,
    delay: -(i * 3 + (i % 3) * 2),
    dur: 14 + (i % 4) * 3,
    dx: ((i * 41) % 60) - 30 + "vw",
    size: 18 + (i % 3) * 8,
    color: ["var(--maple)", "var(--amber)", "var(--maple-deep)", "var(--amber-soft)"][i % 4],
    rotate: (i * 47) % 360,
  }));
  return (
    <div className="absolute inset-0 pointer-events-none z-[1] overflow-hidden" aria-hidden="true">
      {leaves.map((l, i) => (
        <span key={i} className="absolute maple-fall" style={{ left: l.left+"%", top: 0, "--dur": l.dur+"s", "--delay": l.delay+"s", "--dx": l.dx, animationDelay: l.delay+"s", transform: `rotate(${l.rotate}deg)`, opacity: .45 }}>
          <MapleLeaf size={l.size} color={l.color}/>
        </span>
      ))}
    </div>
  );
};

/* ---------- Thesis: Community is medicine ---------- */

          </div>
        </div>
      </div>
    </section>
  );
}

/* ---------- The case for community: research ---------- */
function TheCase() {
  const stats = [
    {
      tag: "Neighbors",
      big: "1 in 4",
      sub: "Only about a quarter of U.S. adults (26%) know all or most of their neighbors.",
      src: "Pew Research Center, 2025",
      c: "var(--maple)",
    },
    {
      tag: "Neighbors",
      big: "1 in 8",

      src: "Pew Research Center, 2025",
      c: "var(--maple)",
    },
    {
      tag: "Families",

      sub: "The share of young adults (18–24) eating every meal alone has nearly doubled in two decades — to 25% on a given day.",

      c: "var(--amber)",
    },
    {
      tag: "Shared time",
      big: "44% → 28%",
      sub: "Americans spending a social evening with a neighbor a few times a month, 1974 vs. 2022.",
      src: "General Social Survey",
      c: "var(--amber)",
    },
    {
      tag: "Schools",
      big: "16% → 30%",
      sub: "Chronic absenteeism nearly doubled from before the pandemic to 2021–22 — students missing a tenth of the year.",
      src: "Attendance Works · U.S. Dept. of Education",
      c: "var(--pink)",
    },
    {
      tag: "Civic life",
      big: "66% → 50%",
      sub: "The share of U.S. households giving to a charitable or community organization, 2000 vs. 2018.",
      src: "Philanthropy Panel Study",
      c: "var(--moss)",
    },
  ];

  const illness = [
    {
      big: "1 in 2",
      sub: "About half of U.S. adults report experiencing loneliness — even before the pandemic.",
      src: "U.S. Surgeon General, 2023",
    },
    {
      big: "= 15 / day",
      sub: "The mortality impact of social disconnection is comparable to smoking up to 15 cigarettes a day.",
      src: "U.S. Surgeon General, 2023",
    },
    {
      big: "+50%",
      sub: "Loneliness and isolation raise the risk of dementia by roughly 50% in older adults, alongside higher rates of depression and anxiety.",
      src: "U.S. Surgeon General · CDC",
    },
    {
      big: "49,000+",
      sub: "U.S. suicide deaths in 2022 — the most ever recorded — as drug-overdose deaths hold above 100,000 a year.",
      src: "CDC, 2023",
    },
    {
      big: "42%",
      sub: "of U.S. high-school students felt persistently sad or hopeless in 2021 — a youth mental-health crisis the Surgeon General has formally warned of.",
      src: "CDC, Youth Risk Behavior Survey",
    },
  ];
