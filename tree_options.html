<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<style>
  body { margin:0; background:#FAF6F0; font-family:Inter,sans-serif; display:flex; flex-wrap:wrap; gap:32px; padding:40px; }
  .opt { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .label { font-size:13px; font-weight:600; color:#6B1F0E; letter-spacing:.04em; text-transform:uppercase; }
</style></head><body>

<!-- Option A: Layered canopy (current style, refined) -->
<div class="opt"><div class="label">A — Current (refined)</div>
<svg width="200" height="240" viewBox="0 0 200 240" fill="none">
  <ellipse cx="100" cy="228" rx="55" ry="5" fill="#2B1810" opacity=".08"/>
  <rect x="94" y="145" width="12" height="80" rx="4" fill="#6B3F2A"/>
  <line x1="100" y1="170" x2="72" y2="148" stroke="#6B3F2A" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="170" x2="128" y2="148" stroke="#6B3F2A" stroke-width="8" stroke-linecap="round"/>
  <circle cx="70" cy="118" r="38" fill="#D97706" opacity=".88"/>
  <circle cx="130" cy="118" r="38" fill="#A8341A" opacity=".9"/>
  <circle cx="90" cy="90" r="36" fill="#C2410C"/>
  <circle cx="115" cy="88" r="34" fill="#D97706" opacity=".85"/>
  <circle cx="100" cy="105" r="42" fill="#6B1F0E" opacity=".82"/>
</svg></div>

<!-- Option B: Flat dome — single clean canopy shape -->
<div class="opt"><div class="label">B — Flat dome</div>
<svg width="200" height="240" viewBox="0 0 200 240" fill="none">
  <ellipse cx="100" cy="228" rx="52" ry="5" fill="#2B1810" opacity=".08"/>
  <rect x="95" y="148" width="10" height="78" rx="4" fill="#5C3320"/>
  <path d="M100 155 L78 138 M100 158 L122 138" stroke="#5C3320" stroke-width="7" stroke-linecap="round"/>
  <!-- dome canopy -->
  <path d="M30 135 Q30 58 100 58 Q170 58 170 135 Q150 155 100 158 Q50 155 30 135Z" fill="#A8341A"/>
  <path d="M30 135 Q30 80 75 72 Q55 95 62 122 Q40 130 30 135Z" fill="#D97706" opacity=".9"/>
  <path d="M170 135 Q160 80 130 72 Q148 98 142 124 Q158 130 170 135Z" fill="#C2410C" opacity=".8"/>
  <path d="M60 90 Q80 64 100 62 Q120 64 140 90 Q125 78 100 76 Q75 78 60 90Z" fill="#6B1F0E" opacity=".25"/>
</svg></div>

<!-- Option C: Branchy / illustrated -->
<div class="opt"><div class="label">C — Illustrated branches</div>
<svg width="200" height="240" viewBox="0 0 200 240" fill="none">
  <ellipse cx="100" cy="228" rx="50" ry="5" fill="#2B1810" opacity=".08"/>
  <!-- trunk -->
  <path d="M94 228 L94 165 Q94 155 100 150 Q106 155 106 165 L106 228Z" fill="#5C3320"/>
  <!-- main branches -->
  <path d="M100 155 C95 148 80 138 62 128" stroke="#5C3320" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M100 155 C105 145 120 132 138 122" stroke="#5C3320" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M100 150 C100 140 100 125 100 112" stroke="#5C3320" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M62 128 C55 118 50 105 48 92" stroke="#5C3320" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M138 122 C145 110 150 97 152 85" stroke="#5C3320" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- leaf clusters -->
  <circle cx="48" cy="82" r="26" fill="#D97706" opacity=".9"/>
  <circle cx="100" cy="75" r="30" fill="#A8341A" opacity=".92"/>
  <circle cx="152" cy="76" r="24" fill="#C2410C" opacity=".88"/>
  <circle cx="68" cy="108" r="20" fill="#6B1F0E" opacity=".7"/>
  <circle cx="134" cy="105" r="18" fill="#D97706" opacity=".75"/>
  <circle cx="100" cy="95" r="22" fill="#A8341A" opacity=".6"/>
</svg></div>

<!-- Option D: Abstract stacked ovals — very minimal -->
<div class="opt"><div class="label">D — Stacked / minimal</div>
<svg width="200" height="240" viewBox="0 0 200 240" fill="none">
  <ellipse cx="100" cy="228" rx="48" ry="5" fill="#2B1810" opacity=".08"/>
  <rect x="95" y="148" width="10" height="78" rx="4" fill="#5C3320"/>
  <path d="M100 162 L76 145 M100 162 L124 145" stroke="#5C3320" stroke-width="6" stroke-linecap="round"/>
  <!-- stacked ellipse canopy -->
  <ellipse cx="100" cy="148" rx="58" ry="20" fill="#D97706"/>
  <ellipse cx="100" cy="126" rx="52" ry="20" fill="#C2410C"/>
  <ellipse cx="100" cy="105" rx="44" ry="20" fill="#A8341A"/>
  <ellipse cx="100" cy="86"  rx="34" ry="18" fill="#6B1F0E"/>
  <ellipse cx="100" cy="70"  rx="20" ry="14" fill="#A8341A" opacity=".85"/>
</svg></div>

<!-- Option E: Watercolor blob / organic -->
<div class="opt"><div class="label">E — Organic blobs</div>
<svg width="200" height="240" viewBox="0 0 200 240" fill="none">
  <ellipse cx="100" cy="228" rx="50" ry="5" fill="#2B1810" opacity=".08"/>
  <rect x="95" y="150" width="10" height="76" rx="4" fill="#5C3320"/>
  <path d="M100 160 L74 144 M100 163 L126 144" stroke="#5C3320" stroke-width="7" stroke-linecap="round"/>
  <!-- organic shapes -->
  <path d="M55 140 C40 120 38 90 58 72 C72 58 90 62 100 78 C88 65 72 62 62 76 C45 96 50 128 65 140Z" fill="#D97706" opacity=".85"/>
  <path d="M145 140 C160 120 162 90 142 72 C128 58 110 62 100 78 C112 65 128 62 138 76 C155 96 150 128 135 140Z" fill="#C2410C" opacity=".82"/>
  <path d="M65 108 C55 85 65 60 85 52 C95 48 105 48 115 52 C135 60 145 85 135 108 C120 95 115 75 100 72 C85 75 80 95 65 108Z" fill="#A8341A" opacity=".9"/>
  <path d="M78 100 C75 78 88 60 100 58 C112 60 125 78 122 100 C115 85 108 76 100 75 C92 76 85 85 78 100Z" fill="#6B1F0E" opacity=".8"/>
</svg></div>

</body></html>
